name: Daily Guild Activity Fetch

on:
  schedule:
    # Runs at 11:50 UTC daily
    - cron: '50 11 * * *'
  workflow_dispatch:
    inputs:
      run_backfill:
        description: 'Run backfill instead of daily fetch'
        required: false
        default: 'false'
        type: boolean
      backfill_days:
        description: 'Days to backfill (default 90)'
        required: false
        default: '90'
        type: string
      guild_id:
        description: 'Specific guild ID to backfill (leave empty for all)'
        required: false
        default: ''
        type: string

jobs:
  fetch-activity:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Fetch daily guild activity
        if: ${{ github.event.inputs.run_backfill != 'true' }}
        run: |
          echo "Fetching daily activity for all guilds..."
          response=$(curl -s -L -w "\n%{http_code}" -X POST "${{ secrets.SITE_URL }}/api/cron/daily-activity" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Response: $body"
          echo "HTTP status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "ERROR: Daily activity fetch failed with status $http_code"
            exit 1
          fi

      - name: Sync members for all guilds
        if: ${{ github.event.inputs.run_backfill != 'true' }}
        run: |
          echo "Syncing members for all guilds..."
          response=$(curl -s -L -w "\n%{http_code}" -X POST "${{ secrets.SITE_URL }}/api/cron/members-sync-all" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}')
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Response: $body"
          echo "HTTP status: $http_code"

      - name: Run backfill
        if: ${{ github.event.inputs.run_backfill == 'true' }}
        run: |
          DAYS="${{ github.event.inputs.backfill_days }}"
          GUILD_ID="${{ github.event.inputs.guild_id }}"
          PAYLOAD="{\"days\": $DAYS"
          if [ -n "$GUILD_ID" ]; then
            PAYLOAD="$PAYLOAD, \"guild_id\": \"$GUILD_ID\""
          fi
          PAYLOAD="$PAYLOAD}"
          echo "Running backfill: $PAYLOAD"
          response=$(curl -s -L -w "\n%{http_code}" -X POST "${{ secrets.SITE_URL }}/api/cron/backfill" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)
          echo "Response: $body"
          echo "HTTP status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "ERROR: Backfill failed with status $http_code"
            exit 1
          fi
